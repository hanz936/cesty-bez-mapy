name: db-lint
on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
jobs:
  pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase test db
